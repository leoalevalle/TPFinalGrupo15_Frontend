<div class="card shadow-sm mb-4 border-0 bg-light rounded-3">
    <div class="card-body py-2">
        <div class="row align-items-center text-center">
            
            <div class="col-md-4 col-sm-4 mb-2 mb-md-0 d-flex flex-column align-items-center">
                <span class="text-muted small fw-semibold mb-1">Estado:</span>
                <span class="badge rounded-pill px-3 py-2 fw-bold"
                      [class.bg-success]="enJornada"
                      [class.bg-danger]="!enJornada">
                    {{ enJornada ? 'Disponible' : 'No disponible' }}
                </span>
            </div>
        
            <div class="col-md-4 col-sm-4 mb-2 mb-md-0 d-flex flex-column align-items-center border-start border-end border-2 border-opacity-10 border-secondary">
                <span class="text-muted small fw-semibold mb-1">Zona actual:</span>
                <span class="fw-bold text-dark small">{{ zonaActual }}</span>
            </div>

            <div class="col-md-4 col-sm-4 d-flex justify-content-center align-items-center">
                <button *ngIf="!enJornada"
                        class="btn btn-success btn-sm fw-bold px-3 py-1.5 w-auto shadow-sm"
                        (click)="iniciarJornada()">
                    Iniciar Jornada
                </button>
                <button *ngIf="enJornada"
                        class="btn btn-danger btn-sm fw-bold px-3 py-1.5 w-auto shadow-sm"
                        (click)="finalizarJornada()">
                    Finalizar Jornada
                </button>
            </div>

        </div>
    </div>
</div>
